version: "3.9"

services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE_URL=http://backend:8000/api/v1
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
